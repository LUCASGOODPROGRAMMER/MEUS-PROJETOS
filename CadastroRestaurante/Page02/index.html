<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>FORMULÁRIO DE CADASTRO</title>
</head>
<body>
    <header></header>
    <main>
        <section>
            <form class="container-cadastro">
                <div class="div-group">
                    <label for="nome">Nome</label>               
                    <input type="text" placeholder="Digite Seu Nome" id="nome"></input> 
                </div >
                <div class="div-group">
                    <label for="telefone">Telefone</label>
                    <input type="text" id="telefone" placeholder="Informe Seu Número">

                    <label for="cnpj">CNPJ</label>
                    <input type="text" id="cnpj" placeholder="Informe Sua Cnpj">
                </div>
                <div class="div-group">
                    <label for="endereco">Endereço</label>
                    <input type="text" id="endereco" placeholder="Informe Seu Endereço">
                </div>
                <button type="submit">ENVIAR</button>                 
            </form>
        </section>
    </main>
</body>
</html>
