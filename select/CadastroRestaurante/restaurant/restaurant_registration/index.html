<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>FORMULÁRIO DE CADASTRO</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="./font/baron_neue/Baron Neue Black Italic.otf"> <!--acessando arquivo-->
</head>

<body>
    <header>
        <nav>
            <div class="back-button">
                <a href="../restaurant_introduction/index.html"><img src="../imgs/nav_imgs/back.png"></a>
            </div>
            <div class="center-logo">
                <img src="../imgs/nav_imgs/logo.png" class="icon">
                <a class="logo" href="/" id="logo">RED RIDERS</a>
            </div>
            <div></div>
        </nav>
    </header>
    <main>
        <section class="container-full">
            <form class="container-cadastro">
                <div class="titulo">Cadastre seu restaurante</div>
                <div class="div-group">
                    <label for="nome">Nome</label>
                    <input type="text" placeholder="Digite Seu Nome" id="nome"></input>
                </div>
                <div class="div-group2">
                    <div>
                        <label for="telefone">Telefone</label>
                        <input type="text" id="telefone" placeholder="Informe Seu Número">
                    </div>
                    <div>
                        <label for="cnpj">CNPJ</label>
                        <input type="text" id="cnpj" placeholder="Informe Sua Cnpj">
                    </div>
                </div>
                <div class="div-group">
                    <label for="endereco">Endereço</label>
                    <input type="text" id="endereco" placeholder="Informe Seu Endereço">
                </div>
                <button type="submit" class>ENVIAR</button>
            </form>
        </section>
    </main>
</body>

</html>
